<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Select Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-app-region: no-drag;
        }

        body {
            padding: 0;
        }

        .picker {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: none;
            border-radius: 10px;
            box-shadow: none;
            overflow-y: auto;
        }

        .picker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            min-height: 34px;
            padding: 8px 14px;
            border: none;
            background: none;
            color: #969696;
            text-align: left;
            font-family: inherit;
            font-size: 12.5px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .picker-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #f7f7f7;
        }

        .picker-item.selected {
            color: #FFFFFF;
        }

        .check-mark {
            width: 14px;
            flex-shrink: 0;
            text-align: center;
            color: #ff4000;
        }

        .name {
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div id="picker" class="picker"></div>
    <script type="module" src="./display-picker.js"></script>
</body>
</html>
